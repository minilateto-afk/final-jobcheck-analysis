databases:
  - name: jobcheck-db
    plan: free

services:
  - type: web
    name: jobcheck-labor-analysis
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobcheck-db
          property: connectionString
      - key: RUN_PIPELINE_ON_STARTUP
        value: "false"
      - key: USE_MOL_DYNAMIC_FETCH
        value: "true"
      - key: PYTHONUNBUFFERED
        value: "1"